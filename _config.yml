title: Volar Robotics
tagline: Enabling tactile interaction in the sky
description: >-
  Volar Robotics builds soft aerial robots that physically interact with
  industrial assets — turning drones from cameras into workers for
  non-destructive testing and inspection.
url: "https://volar-robotics.github.io"
baseurl: ""
lang: en

author:
  name: Volar Robotics

# Use Jekyll's safe defaults; no remote theme.
theme: null
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
sass:
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  projects:
    output: true
    permalink: /projects/:name/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - test

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/og-image.svg
  - scope:
      path: ""
      type: projects
    values:
      layout: default
